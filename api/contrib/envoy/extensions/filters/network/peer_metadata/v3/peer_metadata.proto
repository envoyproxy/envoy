syntax = "proto3";

package envoy.extensions.network_filters.peer_metadata;

import "udpa/annotations/status.proto";

option java_package = "io.envoyproxy.envoy.extensions.network_filters.peer_metadata";
option java_outer_classname = "PeerMetadataProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/contrib/envoy/extensions/network_filters/peer_metadata";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Peer metadata network filter]
//
// Peer metadata network filter for extracting and propagating peer telemetry
// attributes from HBONE CONNECT response headers.
// [#extension: envoy.filters.network.peer_metadata]

// Selects how discovered peer metadata is handed from the downstream
// (connect_originate) filter to the upstream (cluster-side) filter.
enum MetadataExchangeMode {
  // Legacy mechanism and the default, retained for backwards compatibility with
  // older Envoy versions that only support this scheme: the downstream filter
  // injects the peer metadata as a length-prefixed preamble into the data
  // stream, which the upstream filter consumes and strips before any real data.
  // Selected when no mode is set.
  DATA_STREAM_PREAMBLE = 0;

  // Hand off peer metadata via a per-worker-thread registry keyed by the
  // originating downstream connection ID; the data stream is left untouched.
  // Requires the downstream and upstream filters to run on the same worker
  // thread (the case for internal-listener connections).
  THREAD_LOCAL_REGISTRY = 1;
}

// Configuration for the downstream network filter installed in the
// connect_originate or inner_connect_originate filter chains. It extracts
// peer metadata from TCP Proxy filter state (baggage header from HBONE CONNECT
// response) and hands it to the upstream filter via the configured mode.
message Config {
  // What filter state to use to save the baggage value that encodes the proxy
  // workload.
  //
  // The upstream filter that will populate the baggage header in the HBONE
  // request should be configured to use the same key.
  //
  // Why share baggage value via filter state instead of to configure upstream
  // filter to use the baggage key value directly?
  //
  // ztunnel and waypoint have to be aware of the baggage header format,
  // because they should be able to parse baggage headers to extract the
  // metadata and report the metrics. However, pilot does not need to be aware
  // of the baggage encoding yet.
  //
  // If instead of using custom filter to generate baggage header value we just
  // let pilot generate it, it would spread the logic for generating baggage to
  // the pilot as well. While not a big deal, if there is no clear reason to do
  // it, let's not duplicate the implementation of baggage logic in pilot and
  // just re-use the logic we already have in Envoy.
  string baggage_key = 1;

  // How discovered peer metadata is handed to the upstream peer_metadata
  // filter. Must match the mode configured on the paired upstream filter.
  // Defaults to ``DATA_STREAM_PREAMBLE``.
  MetadataExchangeMode mode = 2;
}

// Configuration for the upstream network filter installed in service clusters
// that communicate over HBONE. It obtains the peer metadata delivered by the
// downstream filter (via the configured mode) and populates filter state for
// use by Istio telemetry filters.
message UpstreamConfig {
  // How the downstream peer_metadata filter delivers peer metadata. Must match
  // the mode configured on the paired downstream filter. Defaults to
  // ``DATA_STREAM_PREAMBLE``.
  MetadataExchangeMode mode = 1;
}
