syntax = "proto3";

package envoy.type.v3;

import "udpa/annotations/status.proto";

option java_package = "io.envoyproxy.envoy.type.v3";
option java_outer_classname = "ScopeProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/type/v3;typev3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Scope]

// Configuration for limiting the number of stats in a scope.
message ScopeConfig {
  // Max number of counters allowed in this scope. 0 means no limit.
  // When the limit is reached, new counters will not be created.
  uint32 max_counters = 1;

  // Max number of gauges allowed in this scope. 0 means no limit.
  // When the limit is reached, new gauges will not be created.
  uint32 max_gauges = 2;

  // Max number of histograms allowed in this scope. 0 means no limit.
  // When the limit is reached, new histograms will not be created.
  uint32 max_histograms = 3;

  // Whether the scope and its stats can be evicted from the store caches.
  // The eviction policy is a mark-and-sweep approach where stats are evicted
  // if they are not updated or accessed between two successive eviction sweeps.
  // The eviction will happen only if the :ref:`stats_eviction_interval <envoy_v3_api_field_config.bootstrap.v3.Bootstrap.stats_eviction_interval>` is configured in
  // the bootstrap.
  bool evictable = 4;
}

// Stats scope configuration.
// This configuration can be used to create a singleton scope that is shared
// across multiple instances within the process. The scope is uniquely identified and shared
// based on the config hash.
message Scope {
  // The scope configuration.
  ScopeConfig config = 1;

  // If set to true and `name` is not empty, the scope will be shared.
  bool enable_sharing = 2;

  // The stats scope prefix.
  string prefix = 3;

  // The scope name, required for shared scopes.
  // If empty, no sharing will happen.
  string name = 4;
}
