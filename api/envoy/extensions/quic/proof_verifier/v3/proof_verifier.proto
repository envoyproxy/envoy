syntax = "proto3";

package envoy.extensions.quic.proof_verifier.v3;

import "udpa/annotations/status.proto";

option java_package = "io.envoyproxy.envoy.extensions.quic.proof_verifier.v3";
option java_outer_classname = "ProofVerifierProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/quic/proof_verifier/v3;proof_verifierv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: QUIC proof verifier configuration]
// [#extension: envoy.quic.server.proof_verifier.filter_chain]

// Configuration for QUIC server proof verifier.
// The proof verifier validates client certificates using the filter chain's TLS context.
// [#next-free-field: 2]
message ProofVerifierConfig {
  // If set to true, client certificate validation failures will be logged at debug level
  // instead of warning level. This can be useful in environments where client certificate
  // validation failures are expected and should not generate excessive warnings.
  // Defaults to false (validation failures logged as warnings).
  bool silent_validation_failures = 1;
}
