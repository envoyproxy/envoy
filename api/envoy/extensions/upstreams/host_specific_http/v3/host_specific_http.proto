syntax = "proto3";

package envoy.extensions.upstreams.host_specific_http.v3;

import "envoy/config/core/v3/protocol.proto";
import "envoy/type/matcher/v3/metadata.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.upstreams.host_specific_http.v3";
option java_outer_classname = "HostSpecificHttpProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/upstreams/host_specific_http/v3;host_specific_httpv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Host Specific HTTP Protocol Options]

// Aggregates endpoint-specific protocol options. Each item has
// a "metadata match" field that allows for specific endpoints to
// pick up a particular configuration.
message EndpointSpecificHttpProtocolOptions {
  // Defines endpoint-specific HTTP protocol options. These options
  // are only applied to endpoints for each their metadata match the
  // ``endpoint_metadata_match`` field. Otherwise the endpoint will
  // pick the cluster's protocol options.
  message EndpointSpecificOptions {
    // Endpoint-specific HTTP/2 protocol options.
    config.core.v3.Http2ProtocolOptions http2_protocol_options = 1;

    // Endpoint-specific HTTP protocol options.
    config.core.v3.HttpProtocolOptions http_protocol_options = 2;

    // Defines metadata matcher that will be used to match against the endpoints
    // these configurations should be applied to.
    //
    // Example:
    //
    // .. code::
    //
    //      endpoint_metadata_match:
    //        filter: endpoint_specific_protocol_options
    //        path:
    //        - key: type
    //        value:
    //          string_match:
    //            exact: "high_throughput"
    //
    type.matcher.v3.MetadataMatcher endpoint_metadata_match = 3
        [(validate.rules).message = {required: true}];
  }

  repeated EndpointSpecificOptions endpoint_specific_options = 1;
}
