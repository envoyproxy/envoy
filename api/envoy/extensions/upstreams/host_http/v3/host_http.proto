syntax = "proto3";

package envoy.extensions.upstreams.host_http.v3;

import "envoy/config/core/v3/protocol.proto";
import "envoy/type/matcher/v3/metadata.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.upstreams.host_http.v3";
option java_outer_classname = "HostHttpProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/upstreams/host_http/v3;host_httpv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Host Specific HTTP Protocol Options]

// Aggregates host-specific protocol options. Each item has
// a "metadata match" field that allows to pick a specific
// configuration for matching hosts.
message HostHttpProtocolOptions {
  // Defines host-specific HTTP protocol options. These options
  // are only applied to hosts with metadata matching the
  // ``host_metadata_match`` field. Otherwise the host will
  // use the cluster's protocol options.
  message HostOptions {
    // Host-specific HTTP/2 protocol options.
    config.core.v3.Http2ProtocolOptions http2_protocol_options = 1;

    // Host-specific HTTP protocol options.
    config.core.v3.HttpProtocolOptions http_protocol_options = 2;

    // Defines metadata matcher that will be used to match against the hosts
    // and override cluster-level protocol options when host-specific protocol
    // options are available.
    //
    // Example:
    //
    // .. code::
    //
    //      host_metadata_match:
    //        filter: host_specific_protocol_options
    //        path:
    //        - key: type
    //        value:
    //          string_match:
    //            exact: "high_throughput"
    //
    type.matcher.v3.MetadataMatcher host_metadata_match = 3
        [(validate.rules).message = {required: true}];
  }

  repeated HostOptions host_options = 1;
}
