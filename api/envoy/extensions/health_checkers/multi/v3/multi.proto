syntax = "proto3";

package envoy.extensions.health_checkers.multi.v3;

import "envoy/config/core/v3/health_check.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.health_checkers.multi.v3";
option java_outer_classname = "MultiProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/health_checkers/multi/v3;multiv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Multiple Health Checkers]
// Multiple health checker :ref:`configuration overview <config_health_checkers_multi>`.
// [#extension: envoy.health_checkers.multi]

// Configuration for the multiple health checker extension.
// All configured health check methods must pass for a host to be considered healthy.
// Timing, thresholds, and transport socket configuration come from the enclosing
// :ref:`HealthCheck <envoy_v3_api_msg_config.core.v3.HealthCheck>` message.
message Multi {
  message HealthCheckMethod {
    oneof method {
      option (validate.required) = true;

      // HTTP health check.
      config.core.v3.HealthCheck.HttpHealthCheck http_health_check = 1;

      // TCP health check.
      config.core.v3.HealthCheck.TcpHealthCheck tcp_health_check = 2;

      // gRPC health check.
      config.core.v3.HealthCheck.GrpcHealthCheck grpc_health_check = 3;

      // Custom health check.
      config.core.v3.HealthCheck.CustomHealthCheck custom_health_check = 4;
    }

    // Optional name for this sub-checker's metrics. If set, stats for this
    // sub-checker will be emitted under ``health_check.name.<name>.{attempt,success,...}``
    // instead of the default ``health_check.{attempt,success,...}``.
    string name = 5;
  }

  // The health check methods to run. All must pass for a host to be considered healthy.
  // At least two must be specified.
  repeated HealthCheckMethod methods = 1 [(validate.rules).repeated = {min_items: 2}];
}
