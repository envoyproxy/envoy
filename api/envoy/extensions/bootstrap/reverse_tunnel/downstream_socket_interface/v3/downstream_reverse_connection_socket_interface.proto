syntax = "proto3";

package envoy.extensions.bootstrap.reverse_tunnel.downstream_socket_interface.v3;

import "envoy/config/accesslog/v3/accesslog.proto";
import "envoy/config/core/v3/base.proto";

import "google/protobuf/duration.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.bootstrap.reverse_tunnel.downstream_socket_interface.v3";
option java_outer_classname = "DownstreamReverseConnectionSocketInterfaceProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/bootstrap/reverse_tunnel/downstream_socket_interface/v3;downstream_socket_interfacev3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Bootstrap settings for downstream reverse connection socket interface]
// [#extension: envoy.bootstrap.reverse_tunnel.downstream_socket_interface]

// Configuration for the downstream reverse connection socket interface.
// This interface initiates reverse connections to upstream Envoys and provides
// them as socket connections for downstream requests.
// [#next-free-field: 7]
message DownstreamReverseConnectionSocketInterface {
  // HTTP handshake settings for initiator envoy initiated reverse tunnels.
  message HttpHandshakeConfig {
    // Request path used when issuing the HTTP reverse-connection handshake. Defaults to
    // "/reverse_connections/request".
    string request_path = 1;

    // Additional headers to include in the HTTP handshake request.
    repeated config.core.v3.HeaderValueOption additional_headers = 2;

    // Perform the handshake as an HTTP/1.1 ``Upgrade`` exchange (``Upgrade: reverse-tunnel``,
    // success on ``101``) so HTTP proxies can route the handshake and splice the tunnel
    // afterward. The responder must set this flag to the same value.
    // Defaults to ``false``.
    bool use_http_upgrade = 3;
  }

  // Stat prefix to be used for downstream reverse connection socket interface stats.
  string stat_prefix = 1;

  // Enable detailed per-host and per-cluster statistics.
  // When enabled, emits hidden statistics for individual hosts and clusters.
  // Defaults to ``false``.
  bool enable_detailed_stats = 2;

  // Optional HTTP handshake configuration. When unset, the initiator envoy uses the defaults
  // provided by ``HttpHandshakeConfig``.
  HttpHandshakeConfig http_handshake = 3;

  // Access log configuration for reverse tunnel initiator lifecycle events.
  // Logs are emitted on handshake success, handshake failure, and connection close.
  // Reverse tunnel metadata (``node_id``, ``cluster_id``, ``tenant_id``, upstream cluster, etc.)
  // is available via ``%DYNAMIC_METADATA(envoy.reverse_tunnel.initiator:*)%`` substitutions.
  repeated config.accesslog.v3.AccessLog access_log = 4;

  // Disable circuit breaker for reverse connections.
  // When enabled, the initiator envoy will not place a cluster in backoff when reverse
  // connection attempts fail.
  // Defaults to ``false`` i.e. circuit breaker is enabled.
  bool disable_circuit_breaker = 5;

  // Interval between reverse-connection maintenance passes. On each pass the initiator
  // re-attempts any missing reverse connections to the configured upstream tunnel hosts.
  // Defaults to 10s. Must be greater than or equal to 1ms.
  google.protobuf.Duration maintenance_interval = 6
      [(validate.rules).duration = {gte {nanos: 1000000}}];
}
