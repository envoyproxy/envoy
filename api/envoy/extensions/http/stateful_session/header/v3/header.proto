syntax = "proto3";

package envoy.extensions.http.stateful_session.header.v3;

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.http.stateful_session.header.v3";
option java_outer_classname = "HeaderProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/http/stateful_session/header/v3;headerv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Header based stateful session extension]

// This extension allows the session state to be tracked via request headers.
//
// This extension encodes the address of the upstream host selected by the load balancer
// into a response header with the :ref:`header configuration
// <envoy_v3_api_msg_extensions.http.stateful_session.header.v3.HeaderBasedSessionState>`.
// When new requests are incoming, this extension will try to parse the specific upstream host
// address by header name. If the address parsed from the header corresponds to a valid
// upstream host, this upstream host will be selected first. See :ref:`stateful session filter
// <envoy_v3_api_msg_extensions.filters.http.stateful_session.v3.StatefulSession>`.
//
// For example, if the header name is set to ``session-header``, Envoy will prefer ``1.2.3.4:80``
// as the upstream host when the request contains the following header:
//
// .. code-block:: none
//
//     session-header: "MS4yLjMuNDo4MA==" # base64("1.2.3.4:80")
//
// When processing the upstream response, if ``1.2.3.4:80`` is indeed the final choice the extension
// does nothing. If ``1.2.3.4:80`` is not the final choice, the new selected host will be set to
// response headers (via the ``session-header`` response header).
//
// [#extension: envoy.http.stateful_session.header]
message HeaderBasedSessionState {
  // The name that will be used to obtain header value from downstream HTTP request and generate
  // new response header for downstream. The Envoy assume the upstream server or the Envoy itself
  // will generate the ``name`` field specified header in the response. The header value will
  // contain the necessary information to do the host selection. And Envoy assume the clients
  // will send the same header back in the subsequent requests if they receive the header and want
  // to use the same session.
  string name = 1 [(validate.rules).string = {min_len: 1}];

  // The mode for the header based session state extension.
  Mode mode = 2;
}

message Mode {
  // The override mode config for the header based session state extension.
  message OverrideModeConfig {
  }

  // The packages mode config for the header based session state extension.
  message EnvelopeModeConfig {
  }

  // Set this to enable override mode. In this mode, if the upstream host address is different with
  // the target host address parsed from the ``name`` field specified header in the request, or if
  // the ``name`` field specified header is not present in the request, then the extension will set
  // the ``name`` field specified header value to the upstream host address in the response anyway.
  //
  // Only one of ``override_mode`` or ``envelope_mode`` should be set. This is the
  // default if no any mode config is set.
  OverrideModeConfig override_mode = 1;

  // Set this to enable packages mode. In this mode, iff the header specified by the ``name`` field
  // is present in the response (assume the ``name`` is set to ``session-header`` and original
  // header value is ``xxxxxx``), then the upstream host address and value of ``name`` field
  // specified header will be encoded in following format and the output will be used to update the
  // ``name`` field specified header in the response:
  //
  // .. code-block:: none
  //
  //   session-header: "MS4yLjMuNDo4MDtvcmlnaW46eHh4eHh4Cg==" # base64("1.2.3.4:80;origin:xxxxxx")
  //
  // The ``origin`` part is used to store the original header value of ``name`` field specified
  // header. The Envoy will ensure the ``origin`` part should always be last part of the new header
  // value.
  //
  // If this mode is used then Envoy will assume that the header in the request will also be in the
  // same format and will contain the ``origin`` part. This extension will parse the upstream host
  // address and update the ``name`` field specified header in the request to the ``origin`` part.
  //
  // This mode is used for the protocols or scenarios where the server will generate and set the
  // session id in the initial response and the client will use the same header to send the session
  // id in the subsequent requests without any modification.
  //
  // Only one of ``override_mode`` or ``envelope_mode`` should be set. If this is set
  // then it will take precedence over ``override_mode``.
  EnvelopeModeConfig envelope_mode = 2;
}
