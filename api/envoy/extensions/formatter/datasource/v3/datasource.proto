syntax = "proto3";

package envoy.extensions.formatter.datasource.v3;

import "envoy/config/core/v3/base.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.formatter.datasource.v3";
option java_outer_classname = "DatasourceProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/formatter/datasource/v3;datasourcev3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Formatter extension for printing values from DataSources]
// [#extension: envoy.formatter.datasource]

// DataSource formatter extension implements the ``%DATASOURCE(name)%`` command operator that
// resolves the current value of a named :ref:`DataSource <envoy_v3_api_msg_config.core.v3.DataSource>`.
//
// Example configuration:
//
// .. code-block:: yaml
//
//   text_format_source:
//     inline_string: "Bearer %DATASOURCE(api-token)%"
//   formatters:
//   - name: envoy.formatter.datasource
//     typed_config:
//       "@type": type.googleapis.com/envoy.extensions.formatter.datasource.v3.DataSourceFormatter
//       datasources:
//         api-token:
//           filename: /etc/envoy/secrets/api-token.txt
//         region:
//           environment_variable: AWS_REGION
message DataSource {
  // Map from name to DataSource. Each key is used as the subcommand in ``%DATASOURCE(name)%``.
  // For filename DataSources, the formatter will automatically re-read the file when it is updated.
  map<string, config.core.v3.DataSource> datasources = 1 [(validate.rules).map = {min_pairs: 1}];
}
