syntax = "proto3";

package envoy.extensions.filters.http.a2a.v3;

import "google/protobuf/wrappers.proto";

import "udpa/annotations/status.proto";
import "udpa/annotations/versioning.proto";
import "validate/validate.proto";
import "xds/annotations/v3/status.proto";

option java_package = "io.envoyproxy.envoy.extensions.filters.http.a2a.v3";
option java_outer_classname = "A2aProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/filters/http/a2a/v3;a2av3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;
option (xds.annotations.v3.file_status).work_in_progress = true;

// [#protodoc-title: A2A]
// A2A filter :ref:`configuration overview <config_http_filters_a2a>`.
// [#extension: envoy.filters.http.a2a]

// This filter will inspect and get attributes from A2A traffic.
message A2a {
  // Traffic handling mode for non-A2A traffic.
  enum TrafficMode {
    // Default unspecified value. Treated as PASS_THROUGH.
    TRAFFIC_MODE_UNSPECIFIED = 0;

    // Proxies the HTTP request and response without A2A spec check.
    PASS_THROUGH = 1;

    // Reject requests that are not following A2A spec.
    REJECT = 2;
  }

  // Configures how the filter handles non-A2A traffic.
  TrafficMode traffic_mode = 1 [(validate.rules).enum = { defined_only: true }];

  // When set to true, the filter will clear the route cache. This enables the
  // route re-selection.
  bool clear_route_cache = 2;

  // Maximum size of the request body to buffer for JSON-RPC validation.
  // If the request body exceeds this size, the request is rejected with ``413
  // Payload Too Large``. This limit applies to both ``REJECT`` and
  // ``PASS_THROUGH`` modes to prevent unbounded buffering.
  //
  // It defaults to 8KB (8192 bytes) and the maximum allowed value is 10MB
  // (10485760 bytes).
  //
  // Setting it to 0 would disable the limit. It is not recommended to do so in
  // production.
  google.protobuf.UInt32Value max_request_body_size = 3
      [(validate.rules).uint32 = { lte: 10485760 }];

  // Parser configuration, this provide the attribute extraction override.
  ParserConfig parser_config = 4;
}

// This configuration allows overriding the default attribute extraction
// behavior for specific A2A methods.
// TODO(tyxia) - add more fields to support more override use cases.
message ParserConfig {
}
