syntax = "proto3";

package envoy.extensions.filters.http.aws_eventstream_to_metadata.v3;

import "envoy/config/core/v3/extension.proto";

import "google/protobuf/wrappers.proto";

import "xds/annotations/v3/status.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.filters.http.aws_eventstream_to_metadata.v3";
option java_outer_classname = "AwsEventstreamToMetadataProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/filters/http/aws_eventstream_to_metadata/v3;aws_eventstream_to_metadatav3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;
option (xds.annotations.v3.file_status).work_in_progress = true;

// [#protodoc-title: AWS-EventStream-To-Metadata Filter]
//
// The AWS-EventStream-To-Metadata filter extracts values from AWS EventStream HTTP response bodies
// and writes them to dynamic metadata. This is useful for AWS Bedrock streaming response processing,
// token usage tracking, logging, and other observability use cases.
//
// The filter specifically handles the AWS EventStream binary protocol
// (application/vnd.amazon.eventstream) and uses pluggable content parsers to extract values
// from the message payloads. The content parser is a typed extension that can be configured
// to handle different content types (JSON, plaintext, XML, etc.).
//
// The filter only processes responses with Content-Type "application/vnd.amazon.eventstream".
// Content-Type parameters are ignored.
//
// See AWS-EventStream-To-Metadata :ref:`configuration overview <config_http_filters_aws_eventstream_to_metadata>` for more details.
// [#extension: envoy.filters.http.aws_eventstream_to_metadata]

message AwsEventstreamToMetadata {
  // Rules for processing AWS EventStream streams and extracting metadata.
  //
  // The filter parses the AWS EventStream binary protocol (messages with headers and payloads),
  // then delegates to a content parser to parse the message payload and extract metadata.
  // The content parser determines which values to extract and how to write them to metadata.
  message ProcessingRules {
    // Content parser configuration for parsing message payloads and extracting metadata.
    //
    // The content parser specifies:
    // - How to parse the message payload (e.g., JSON, XML, plaintext)
    // - Which values to extract from the parsed content (e.g., JSON paths like usage.total_tokens)
    // - How to map extracted values to metadata (namespace, key, type conversions)
    // - When to write metadata (on_present, on_missing, on_error actions)
    // [#extension-category: envoy.content_parsers]
    config.core.v3.TypedExtensionConfig content_parser = 1
        [(validate.rules).message = {required: true}];

    // Maximum size in bytes for buffered data before it's considered invalid
    // and discarded. This protects against unbounded memory growth from malicious
    // or malformed streams.
    //
    // Default is 1048576 bytes (1MB), which is sufficient for most legitimate messages.
    // Set to 0 to disable the limit (not recommended for production).
    // Maximum allowed value is 26214400 bytes (25MB, slightly larger than AWS max payload of 24MB).
    google.protobuf.UInt32Value max_buffer_size = 2 [(validate.rules).uint32 = {lte: 26214400}];
  }

  // Rules for processing AWS EventStream response streams.
  ProcessingRules response_rules = 1 [(validate.rules).message = {required: true}];
}
