syntax = "proto3";

package envoy.extensions.filters.network.reverse_tunnel.v3;

import "envoy/config/core/v3/base.proto";

import "google/protobuf/duration.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.filters.network.reverse_tunnel.v3";
option java_outer_classname = "ReverseTunnelProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/filters/network/reverse_tunnel/v3;reverse_tunnelv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Reverse Tunnel Network Filter]
// Reverse Tunnel Network Filter :ref:`configuration overview <config_network_filters_reverse_tunnel>`.
// [#extension: envoy.filters.network.reverse_tunnel]

// Validation configuration for reverse tunnel identifiers.
// Validates the node ID, cluster ID, and tenant ID extracted from reverse tunnel handshake headers
// against expected values specified using format strings.
// [#next-free-field: 6]
message Validation {
  // Format string to extract the expected node identifier for validation.
  // The formatted value is compared against the ``x-envoy-reverse-tunnel-node-id`` header
  // from the incoming handshake request. If they do not match, the connection is rejected
  // with HTTP ``403 Forbidden``.
  //
  // Supports Envoy's :ref:`command operators <config_access_log_command_operators>`:
  //
  // * ``%DYNAMIC_METADATA(namespace:key)%``: Extract expected value from dynamic metadata.
  // * ``%FILTER_STATE(key)%``: Extract expected value from filter state.
  // * ``%DOWNSTREAM_REMOTE_ADDRESS%``: Use downstream connection IP address.
  // * Plain strings: Use a static expected value.
  //
  // If empty, node ID validation is skipped.
  //
  // Example using dynamic metadata allowlist:
  //
  // .. code-block:: yaml
  //
  //    node_id_format: "%DYNAMIC_METADATA(envoy.reverse_tunnel.allowlist:expected_node_id)%"
  //
  string node_id_format = 1 [(validate.rules).string = {max_len: 1024}];

  // Format string to extract the expected cluster identifier for validation.
  // The formatted value is compared against the ``x-envoy-reverse-tunnel-cluster-id`` header
  // from the incoming handshake request. If they do not match, the connection is rejected
  // with HTTP ``403 Forbidden``.
  //
  // Supports the same :ref:`command operators <config_access_log_command_operators>` as
  // ``node_id_format``.
  //
  // If empty, cluster ID validation is skipped.
  //
  // Example using filter state:
  //
  // .. code-block:: yaml
  //
  //    cluster_id_format: "%FILTER_STATE(expected_cluster_id)%"
  //
  string cluster_id_format = 2 [(validate.rules).string = {max_len: 1024}];

  // Format string to extract the expected tenant identifier for validation.
  // The formatted value is compared against the ``x-envoy-reverse-tunnel-tenant-id`` header
  // from the incoming handshake request. If they do not match, the connection is rejected
  // with HTTP ``403 Forbidden``.
  //
  // Supports the same :ref:`command operators <config_access_log_command_operators>` as
  // ``node_id_format``.
  //
  // If empty, tenant ID validation is skipped.
  string tenant_id_format = 5 [(validate.rules).string = {max_len: 1024}];

  // Whether to emit validation results as dynamic metadata.
  // When enabled, the filter emits metadata under the namespace specified by
  // ``dynamic_metadata_namespace`` containing:
  //
  // * ``node_id``: The actual node ID from the handshake request.
  // * ``cluster_id``: The actual cluster ID from the handshake request.
  // * ``tenant_id``: The actual tenant ID from the handshake request.
  // * ``validation_result``: Either ``allowed`` or ``denied``.
  //
  // This metadata can be used by subsequent filters or for access logging.
  // Defaults to ``false``.
  bool emit_dynamic_metadata = 3;

  // Namespace for emitted dynamic metadata when ``emit_dynamic_metadata`` is ``true``.
  // If not specified, defaults to ``envoy.filters.network.reverse_tunnel``.
  string dynamic_metadata_namespace = 4 [(validate.rules).string = {max_len: 255}];
}

// Inline authentication of the reverse tunnel handshake against a verifiable JWT.
// When configured on the :ref:`ReverseTunnel
// <envoy_v3_api_msg_extensions.filters.network.reverse_tunnel.v3.ReverseTunnel>` filter, the bearer
// token carried in the handshake request is verified **before** the connection is accepted and its
// socket registered for reuse. A missing or invalid token rejects the handshake with HTTP
// ``401 Unauthorized`` (unless ``allow_missing_or_failed`` is set), so a forged or expired token can
// never produce a usable reverse tunnel.
//
// On success, the verified claims are emitted as dynamic metadata under
// ``claims_metadata_namespace`` so the existing :ref:`Validation
// <envoy_v3_api_msg_extensions.filters.network.reverse_tunnel.v3.Validation>` block can bind a
// claimed handshake identifier to a verified claim, e.g.::
//
//    tenant_id_format: "%DYNAMIC_METADATA(envoy.filters.network.reverse_tunnel.jwt:tenant)%"
//
// forces the ``x-envoy-reverse-tunnel-tenant-id`` header to equal the verified ``tenant`` claim.
//
// .. note::
//   Experimental, minimal implementation: only inline ``local_jwks`` (synchronous verification) is
//   supported; asynchronous ``remote_jwks`` fetching is a planned follow-up. The configuration is
//   deliberately scoped rather than reusing
//   :ref:`JwtProvider <envoy_v3_api_msg_extensions.filters.http.jwt_authn.v3.JwtProvider>`, whose
//   remote-fetch, request-param/cookie extraction and upstream-forwarding fields are not meaningful
//   for an L4 pre-registration handshake; the security-relevant semantics below mirror ``jwt_authn``.
//
// .. attention::
//   Verifying the token proves only that the caller *holds* a valid token; it does **not** by itself
//   prove the caller is the node/cluster/tenant it claims. To authenticate the claimed identity,
//   reference a verified claim from the :ref:`validation
//   <envoy_v3_api_msg_extensions.filters.network.reverse_tunnel.v3.Validation>` block, e.g.
//   ``tenant_id_format: "%DYNAMIC_METADATA(envoy.filters.network.reverse_tunnel.jwt:tenant)%"``.
//   Without such a binding, a token minted for one tenant can open a tunnel claiming another. Tokens
//   without an ``exp`` claim are rejected. All top-level claims are published as dynamic metadata
//   (see ``claims_metadata_namespace``), so do not put secrets in the token.
// [#next-free-field: 8]
message JwtHandshakeValidation {
  // Required. Expected token issuer; the JWT ``iss`` claim must equal this value. A
  // ``jwt_validation`` block with an empty ``issuer`` is rejected at config load, so a validly
  // signed token from an unexpected issuer is never accepted.
  string issuer = 1 [(validate.rules).string = {max_len: 1024}];

  // Allowed audiences. If non-empty, the JWT must carry at least one of these in its ``aud`` claim;
  // matching is normalized (scheme and trailing slash) exactly as in ``jwt_authn``. If empty, the
  // audience is not checked.
  repeated string audiences = 2;

  // Inline JWKS used to verify the token signature. Only inline sources
  // (``inline_string`` / ``inline_bytes`` / ``filename``) are supported; the JWKS is loaded once at
  // config time and verification is fully synchronous.
  config.core.v3.DataSource local_jwks = 3 [(validate.rules).message = {required: true}];

  // Name of the header carrying the token. Defaults to ``authorization``, and a leading ``Bearer ``
  // prefix is stripped when present.
  string token_header = 4 [(validate.rules).string = {max_len: 255 ignore_empty: true}];

  // Namespace under which verified claims are emitted as dynamic metadata. Defaults to
  // ``envoy.filters.network.reverse_tunnel.jwt``. Each top-level JWT claim is written as a field in
  // this namespace so it can be referenced via ``%DYNAMIC_METADATA(namespace:claim)%`` in the
  // ``validation`` block.
  string claims_metadata_namespace = 5 [(validate.rules).string = {max_len: 255 ignore_empty: true}];

  // If ``true``, a missing or invalid token does **not** reject the handshake (verified claims are
  // simply not published). Useful for a staged rollout / audit mode: rejections that *would* have
  // occurred are counted by the ``jwt_would_deny`` stat without closing the connection. Defaults to
  // ``false`` (enforce: a missing or invalid token is rejected with ``401`` and counted by
  // ``jwt_denied``).
  bool allow_missing_or_failed = 6;

  // Clock skew, in seconds, allowed when checking the ``exp`` and ``nbf`` time constraints. Mirrors
  // ``jwt_authn``'s field of the same name. Defaults to 60 seconds when unset (``0``).
  uint32 clock_skew_seconds = 7;
}

// Configuration for the reverse tunnel network filter.
// This filter handles reverse tunnel connection acceptance and rejection by processing
// HTTP requests where required identification values are provided via HTTP headers.
// [#next-free-field: 11]
message ReverseTunnel {
  // Ping interval for health checks on established reverse tunnel connections.
  // If not specified, defaults to ``2 seconds``.
  google.protobuf.Duration ping_interval = 1 [(validate.rules).duration = {
    lte {seconds: 300}
    gte {nanos: 1000000}
  }];

  // Whether to automatically close connections after processing reverse tunnel requests.
  //
  // * When set to ``true``, connections are closed after acceptance or rejection.
  // * When set to ``false``, connections remain open for potential reuse.
  //
  // Defaults to ``false``.
  bool auto_close_connections = 2;

  // HTTP path to match for reverse tunnel requests.
  // If not specified, defaults to ``/reverse_connections/request``.
  string request_path = 3 [(validate.rules).string = {min_len: 1 max_len: 255 ignore_empty: true}];

  // HTTP method to match for reverse tunnel requests.
  // If not specified (``METHOD_UNSPECIFIED``), this defaults to ``GET``.
  config.core.v3.RequestMethod request_method = 4 [(validate.rules).enum = {defined_only: true}];

  // Optional validation configuration for node, cluster, and tenant identifiers.
  // If specified, the filter validates the ``x-envoy-reverse-tunnel-node-id``,
  // ``x-envoy-reverse-tunnel-cluster-id``, and ``x-envoy-reverse-tunnel-tenant-id`` headers
  // against expected values extracted using format strings. Requests that fail validation
  // are rejected with HTTP ``403 Forbidden``.
  Validation validation = 5;

  // Required cluster name for validating reverse tunnel connection initiations.
  // When set, the filter validates that the upstream cluster of the initiator envoy matches this name
  // via ``x-envoy-reverse-tunnel-upstream-cluster-name`` header. Connections with mismatched or missing
  // cluster names are rejected with HTTP ``400 Bad Request``. When empty, no cluster name validation is performed.
  string required_cluster_name = 6 [(validate.rules).string = {max_len: 255 ignore_empty: true}];

  // Accept the handshake as an HTTP/1.1 ``Upgrade`` exchange (``Upgrade: reverse-tunnel``,
  // reply ``101``) so HTTP proxies can route the handshake and splice the tunnel
  // afterward. Non-upgrade requests are rejected with ``426``. The initiator must set this
  // flag to the same value.
  // Defaults to ``false``.
  bool use_http_upgrade = 7;

  // When true, skip worker-thread rebalancing for accepted reverse tunnel connections.
  // This avoids the cross-worker lock in pickLeastLoadedSocketManager.
  // Default: false (rebalancing enabled).
  bool skip_rebalancing = 8;

  // Optional inline JWT authentication for the handshake. When set, the bearer token carried in the
  // handshake request is verified before the connection is accepted or its socket registered. This
  // runs on the real accepted socket, before registration, so it does not interfere with socket
  // reuse. See :ref:`JwtHandshakeValidation
  // <envoy_v3_api_msg_extensions.filters.network.reverse_tunnel.v3.JwtHandshakeValidation>`.
  JwtHandshakeValidation jwt_validation = 10;

  // Enforces the per-node concurrent connection cap (``max_connections_per_node``, configured on
  // the ``UpstreamReverseConnectionSocketInterface`` bootstrap extension) for tunnels accepted by
  // this filter. The cap is checked on the accepting worker but the connection is counted on the
  // worker it is finally rebalanced to, so it is best-effort unless ``skip_rebalancing`` is ``true``.
  // Default: false.
  bool enable_connection_limit = 9;
}
