syntax = "proto3";

package envoy.config.metrics.v3;

import "envoy/config/core/v3/config_source.proto";

import "udpa/annotations/status.proto";
import "udpa/annotations/versioning.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.config.metrics.v3";
option java_outer_classname = "ScopeProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/config/metrics/v3;metricsv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Scope]

// Stats configuration for a scope.
message Scope {
  // Max number of counters allowed in this scope. 0 means no limit
  uint32 max_counters = 1;

  // Max number of gauges allowed in this scope. 0 means no limit.
  uint32 max_gauges = 2;

  // Max number of histograms allowed in this scope. 0 means no limit.
  uint32 max_histograms = 3;

  // Whether the scope and its stats can be evicted from the store caches.
  bool evictable = 4;
}

// Metrics scope configuration that can be dynamically updated.
message DynamicScope {
  // The key used to find the scope in the singleton map.
  string resource_name = 1 [(validate.rules).string = {min_len: 1}];

  // The configuration source for the :ref:`scope
  // <envoy_v3_api_msg_config.metrics.v3.Scope>`. It should stay the same
  // through the process lifetime.
  core.v3.ConfigSource config_source = 2 [(validate.rules).message = {required: true}];
}
