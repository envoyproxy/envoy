date: Pending

behavior_changes:
- area: tls
  change: |
    The :ref:`enforce_rsa_key_usage <envoy_v3_api_field_extensions.transport_sockets.tls.v3.UpstreamTlsContext.enforce_rsa_key_usage>`
    configuration option has been deprecated and ignored. Envoy now always enforces the ``keyUsage`` extension in peer
    certificates. Configurations setting this option to ``false`` will no longer have any effect and enforcement will be used.
- area: http2
  change: |
    Fixed a vulnerability where HTTP/2 PRIORITY and WINDOW_UPDATE frame flood protection could be bypassed
    by rapidly opening and closing streams. The protection now scales with the number of active streams
    rather than cumulative opened streams, and frame usage is retired upon stream closure. This behavioral
    change can be temporarily reverted by setting runtime guard
    ``envoy.reloadable_features.http2_flood_protection_active_streams`` to ``false``.

new_features:
- area: network_ext_proc
  change: |
    Added support for receiving untyped dynamic metadata from the external processing server.
    Configured via :ref:`receiving_namespaces
    <envoy_v3_api_field_extensions.filters.network.ext_proc.v3.MetadataOptions.receiving_namespaces>`.
- area: network_ext_proc
  change: |
    Added ``close_stream_to_ext_proc_server`` to :ref:`ProcessingResponse
    <envoy_v3_api_msg_service.network_ext_proc.v3.ProcessingResponse>` to allow the external processor to request
    closing the gRPC stream early, causing subsequent data to bypass the network ``ext_proc`` filter.
