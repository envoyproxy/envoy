date: Pending

minor_behavior_changes:
# *Changes that may cause incompatibilities for some users, but should not for most*
- area: dns
  change: |
    Share DNSResolver if c-ares config is the same. This is so that qcache can be enabled and shared
    across clusters. This behavior can be reverted by setting the runtime guard
    ``envoy.restart_features.shared_cares_dns_resolver`` to ``false``.

new_features:
- area: cares
  change: |
    Made qcache_max_ttl configurable.
- area: network_ext_proc
  change: |
    Added support for receiving untyped dynamic metadata from the external processing server.
    Configured via :ref:`receiving_namespaces
    <envoy_v3_api_field_extensions.filters.network.ext_proc.v3.MetadataOptions.receiving_namespaces>`.
- area: network_ext_proc
  change: |
    Added ``close_stream_to_ext_proc_server`` to :ref:`ProcessingResponse
    <envoy_v3_api_msg_service.network_ext_proc.v3.ProcessingResponse>` to allow the external processor to request
    closing the gRPC stream early, causing subsequent data to bypass the network ``ext_proc`` filter.
