---
tasks:
  rbe:
    name: "RBE"
    platform: ubuntu2004
    test_targets:
    - "//test/common/common/..."
    - "//test/integration/..."
    - "//test/exe/..."
    test_flags:
    - "--config=clang"
    - "--config=remote-ci"
    - "--define=wasm=disabled"
    - "--jobs=75"
  coverage:
    name: "Coverage"
    platform: ubuntu2004
    shell_commands:
    - "sudo apt -y update && sudo apt -y install automake autotools-dev cmake libtool m4 ninja-build"
    test_targets:
    - "//test/common/common/..."
    - "//test/integration/..."
    - "//test/exe/..."
    test_flags:
    - "--config=coverage"
    - "--config=clang"
