name: Envoy/deflake

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Bazel target to test'
        type: string
        required: true
      test:
        description: 'C++ test'
        type: string
        required: true
      bazel-args:
        description: Toolchain/test type
        type: string
        default: >-
          --config=clang
      runs:
        description: 'Number of runs to test'
        type: number
        default: 1000


jobs:
  env:
    secrets:
      lock-app-key: ${{ secrets.ENVOY_CI_MUTEX_APP_KEY }}
      lock-app-id: ${{ secrets.ENVOY_CI_MUTEX_APP_ID }}
    permissions:
      contents: read
    uses: ./.github/workflows/_load_env.yml

  deflake:
    permissions:
      actions: read
      contents: read
      packages: read
    needs: env
    uses: ./.github/workflows/_run.yml
    with:
      bazel-extra: >-
        --config=rbe
        ${{ inputs.bazel-args }}
      rbe: true
      request: ${{ needs.env.outputs.request }}
      target: deflake
      trusted: true
      steps-pre: |
        - shell: bash
          run: |
            echo ENVOY_DEFLAKE_JOBS=300 >> $GITHUB_ENV
            echo ENVOY_DEFLAKE_RUNS=${{ inputs.runs }} >> $GITHUB_ENV
            echo ENVOY_DEFLAKE_TARGET=${{ inputs.target }} >> $GITHUB_ENV
            echo ENVOY_DEFLAKE_TEST=${{ inputs.test }} >> $GITHUB_ENV
