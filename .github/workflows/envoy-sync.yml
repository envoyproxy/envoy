name: 'Sync downstream'

permissions:
  contents: read

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}


jobs:
  sync:
    runs-on: ubuntu-24.04
    if: >-
      github.repository == 'envoyproxy/envoy'
      && (github.ref_name == 'main')
      && (github.event.push
          || !contains(github.actor, '[bot]'))
    strategy:
      fail-fast: false
      matrix:
        downstream:
        - go-control-plane
        - envoy-filter-example
        - data-plane-api
        - mobile-website
    steps:
    - name: Skip if superseded by a newer commit on main
      id: tip
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TIP=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)
        echo "Tip of main: ${TIP}"
        echo "This commit:  ${GITHUB_SHA}"
        if [ "${TIP}" != "${GITHUB_SHA}" ]; then
            echo "Superseded by ${TIP} - skipping sync of ${{ matrix.downstream }}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
        fi
    - if: steps.tip.outputs.skip != 'true'
      uses: envoyproxy/toolshed/actions/appauth@e015acba9cafc8e7e53ac64498e95d25426473fc  # v0.4.10
      id: appauth
      with:
        app_id: ${{ secrets.ENVOY_CI_SYNC_APP_ID }}
        key: ${{ secrets.ENVOY_CI_SYNC_APP_KEY }}
    - if: steps.tip.outputs.skip != 'true'
      uses: envoyproxy/toolshed/actions/dispatch@e015acba9cafc8e7e53ac64498e95d25426473fc  # v0.4.10
      with:
        repository: "envoyproxy/${{ matrix.downstream }}"
        ref: main
        token: ${{ steps.appauth.outputs.token }}
        workflow: envoy-sync.yaml
