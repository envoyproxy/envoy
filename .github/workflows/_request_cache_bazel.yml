name: Request/Cache prime (bazel)

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      app-id:
        required: true
      app-key:
        required: true

    inputs:
      arch:
        type: string
        default: x64
      caches:
        type: string
        required: true
      output-base:
        type: string
        default: base
      request:
        type: string
        required: true
      runs-on:
        type: string
        default:
      lock-repository:
        type: string
        default: envoyproxy/ci-mutex
      targets:
        type: string
        default: ...
      working-dir:
        type: string
        default: ""


jobs:
  bazel:
    permissions:
      actions: write
      contents: read
      packages: read
    runs-on: ${{ inputs.runs-on || fromJSON(inputs.request).config.ci.agent-ubuntu }}
    name: >-
      [${{ inputs.arch }}${{
        inputs.output-base != 'base'
        && format('/{0}', inputs.output-base)
        || ''
      }}] Prime Bazel cache
    if: >-
      ${{
        (inputs.output-base == 'base'
         && ! fromJSON(inputs.caches).bazel[inputs.arch])
        || (inputs.output-base != 'base'
            && ! fromJSON(inputs.caches).bazel[format('{0}-{1}', inputs.output-base, inputs.arch)])
      }}
    steps:
    - uses: envoyproxy/toolshed/actions/bind-mounts@719447d2ab39e226e7bdceb58fd61340821d8473  # actions-v0.4.16
      with:
        mounts: |
          - src: /mnt/workspace
            target: GITHUB_WORKSPACE
            chown: "runner:runner"
          - src: /mnt/workspace
            target: /source
            chown: "runner:docker"
          # Simulate container build directory
          - src: /mnt/build
            target: /build
            chown: "runner:docker"
    - name: Free diskspace
      uses: envoyproxy/toolshed/actions/diskspace@719447d2ab39e226e7bdceb58fd61340821d8473  # actions-v0.4.16
      if: inputs.arch == 'x64' && github.event.repository.private
    - uses: envoyproxy/toolshed/actions/github/checkout@719447d2ab39e226e7bdceb58fd61340821d8473  # actions-v0.4.16
      id: checkout-target
      name: Checkout Envoy repository (target branch)
      with:
        branch: ${{ fromJSON(inputs.request).request.target-branch }}
        config: |
          fetch-depth: 1

    - uses: envoyproxy/toolshed/actions/appauth@719447d2ab39e226e7bdceb58fd61340821d8473  # actions-v0.4.16
      id: appauth
      name: Appauth (mutex lock)
      with:
        app_id: ${{ secrets.app-id }}
        key: ${{ secrets.app-key }}

    - uses: envoyproxy/toolshed/actions/cache/prime@719447d2ab39e226e7bdceb58fd61340821d8473  # actions-v0.4.16
      id: bazel-cache
      name: Prime Bazel cache
      with:
        artifact-name: >-
          ${{ fromJSON(inputs.request).config.ci.cache.bazel.hash }}-${{
            inputs.output-base != 'base'
            && format('{0}-', inputs.output-base)
            || ''
          }}${{ inputs.arch }}
        artifact-wf-path: .github/workflows/request.yml
        cache-type: artifact
        change-directory: false
        # TODO(phlax): add loop for multiple targets
        command: |
          # Simulate container source directory
          cd /source
          export BAZEL_BUILD_EXTRA_OPTIONS="--config=ci --config=rbe"
          export ENVOY_CACHE_ROOT=/build/bazel_root
          export ENVOY_CACHE_OUTPUT_BASE="${INPUT_OUTPUT_BASE}"
          export ENVOY_CACHE_TARGETS=$(echo "${INPUT_TARGETS}" | sed 's/ / + /g')
          export ENVOY_CACHE_WORKING_DIR="${INPUT_WORKING_DIR}"
          # ironically the repository_cache is just about the only thing you dont want to cache
          export ENVOY_REPOSITORY_CACHE=/tmp/cache
          ./ci/do_ci.sh cache-create
        key: >-
          ${{ fromJSON(inputs.request).config.ci.cache.bazel.hash }}-${{
            inputs.output-base != 'base'
            && format('{0}-', inputs.output-base)
            || ''
          }}${{ inputs.arch }}
        lock-token: ${{ steps.appauth.outputs.token }}
        lock-repository: ${{ inputs.lock-repository }}
        mount-tmpfs: false
        path: /build/bazel_root
        run-as-sudo: false
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_OUTPUT_BASE: ${{ inputs.output-base }}
        INPUT_TARGETS: ${{ inputs.targets }}
        INPUT_WORKING_DIR: ${{ inputs.working-dir }}
