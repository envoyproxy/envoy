name: Publish (containers)

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      dockerhub-write-token:
    inputs:
      dev:
        required: true
        type: boolean
        default: true
      dockerhub-repo:
        required: true
        default: envoy
        type: string
      dockerhub-username:
        required: true
        type: string
      ghcr:
        required: false
        default: true
        type: boolean
      ghcr-repo:
        required: false
        default: ''
        type: string
      sha:
        required: true
        type: string
      target-branch:
        required: true
        type: string
      trusted:
        required: true
        type: boolean
      version-major:
        required: false
        type: number
      version-minor:
        required: false
        type: number
      version-patch:
        required: false
        type: number

concurrency:
  group: >-
    ${{ github.actor != 'trigger-release-envoy[bot]'
        && github.event.inputs.head_ref
        || github.run_id
    }}-${{ github.event.workflow.id }}-publish-release-container
  cancel-in-progress: true


jobs:
  push-manifests:
    name: Create manifests (${{ inputs.trustred && 'dry run' || 'push' }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
    - name: Configure registries
      id: registries
      uses: envoyproxy/toolshed/actions/jq@1f5b552c6749502b885cb8cf23549b929e745547  # actions-v0.4.17
      with:
        input-format: yaml
        filter: >-
          [.[] | select(.enabled) | .registry | ascii_downcase]
        input: |
          - registry: docker.io/envoyproxy
            enabled: true
          - registry: ghcr.io/${{ inputs.ghcr-repo || github.repository_owner }}
            enabled: ${{ inputs.ghcr }}
    - name: Generate manifest configuration (dev)
      id: dev-config
      if: ${{ inputs.dev && inputs.target-branch == 'main' }}
      uses: envoyproxy/toolshed/actions/jq@1f5b552c6749502b885cb8cf23549b929e745547  # actions-v0.4.17
      with:
        input-format: yaml
        filter: >-
          .registries as $registries
          | {manifests: [.manifests[] as $manifest | $registries[] | $manifest + {registry: .}]}
        input: |
          registries: ${{ steps.registries.outputs.value }}
          manifests:
          - name: ${{ inputs.dockerhub-repo }}
            tag: dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy.{arch}.tar
            additional-tags:
            - dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib.{arch}.tar
            additional-tags:
            - contrib-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-debug-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib-debug.{arch}.tar
            additional-tags:
            - contrib-debug-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-distroless-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib-distroless.{arch}.tar
            additional-tags:
            - contrib-distroless-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: debug-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-debug.{arch}.tar
            additional-tags:
            - debug-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: distroless-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-distroless.{arch}.tar
            additional-tags:
            - distroless-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: google-vrp-dev
            architectures:
            - amd64
            artifact-pattern: envoy-google-vrp.{arch}.tar
            additional-tags:
            - google-vrp-dev-${{ github.sha }}
          - name: ${{ inputs.dockerhub-repo }}
            tag: tools-dev
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-tools.{arch}.tar
            additional-tags:
            - tools-dev-${{ github.sha }}

    - name: Generate manifest configuration (release)
      uses: envoyproxy/toolshed/actions/jq@1f5b552c6749502b885cb8cf23549b929e745547  # actions-v0.4.17
      id: release-config
      if: ${{ ! inputs.dev || ! inputs.target-branch != 'main' }}
      with:
        input-format: yaml
        filter: >-
          .version as $v
          | .registries as $registries
          | {manifests:
              [.manifests[]
               | select(
                   (.tag | test("contrib-distroless") | not)
                   or ($v.major > 1 or ($v.major == 1 and $v.minor >= 37)))
               | . as $manifest
               | $registries[]
               | $manifest + {registry: .}]}
        input: |
          version:
            major: ${{ inputs.version-major }}
            minor: ${{ inputs.version-minor }}
          registries: ${{ steps.registries.outputs.value }}
          manifests:
          - name: ${{ inputs.dockerhub-repo }}
            tag: v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy.{arch}.tar
            additional-tags:
            - v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib.{arch}.tar
            additional-tags:
            - contrib-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-debug-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib-debug.{arch}.tar
            additional-tags:
            - contrib-debug-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: contrib-distroless-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-contrib-distroless.{arch}.tar
            additional-tags:
            - contrib-distroless-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: debug-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-debug.{arch}.tar
            additional-tags:
            - debug-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: distroless-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-distroless.{arch}.tar
            additional-tags:
            - distroless-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: google-vrp-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            artifact-pattern: envoy-google-vrp.{arch}.tar
            additional-tags:
            - google-vrp-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest
          - name: ${{ inputs.dockerhub-repo }}
            tag: tools-v${{ inputs.version-major }}.${{ inputs.version-minor }}.${{ inputs.version-patch }}
            architectures:
            - amd64
            - arm64
            artifact-pattern: envoy-tools.{arch}.tar
            additional-tags:
            - tools-v${{ inputs.version-major }}.${{ inputs.version-minor }}-latest

    - name: Log in to the GitHub Container Registry
      # The collector's buildah only logs in to docker.io/gcr.io; share its auth
      # file by logging in to ghcr.io here, gated to match the collector's push.
      if: >-
        ${{ inputs.ghcr
            && inputs.trusted
            && ! (inputs.target-branch != 'main' && inputs.dev) }}
      shell: bash
      env:
        GHCR_TOKEN: ${{ github.token }}
      run: |
        echo "${GHCR_TOKEN}" \
            | buildah login --username "${{ github.actor }}" --password-stdin ghcr.io

    - name: Collect and push OCI artifacts
      uses: envoyproxy/toolshed/actions/oci/collector@1f5b552c6749502b885cb8cf23549b929e745547  # actions-v0.4.17
      with:
        artifacts-pattern: oci.*
        manifest-config: ${{ steps.dev-config.outputs.value || steps.release-config.outputs.value }}
        dry-run: ${{ ! inputs.trusted || (inputs.target-branch != 'main' && inputs.dev) }}
        dockerhub-username: ${{ inputs.trusted && inputs.dockerhub-username || '' }}
        dockerhub-password: ${{ inputs.trusted && secrets.dockerhub-write-token || '' }}
