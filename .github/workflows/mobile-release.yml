name: Mobile/Release

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Select the job to run'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - android
        - python
  schedule:
  # Mondays at 1pm UTC (8am EST)
  - cron: "0 13 * * 1"

jobs:
  env:
    secrets:
      lock-app-key: ${{ secrets.ENVOY_CI_MUTEX_APP_KEY }}
      lock-app-id: ${{ secrets.ENVOY_CI_MUTEX_APP_ID }}
    permissions:
      contents: read
    uses: ./.github/workflows/_load_env.yml

  android-release:
    permissions:
      actions: read
      contents: read
      packages: read
    if: >-
      github.repository == 'envoyproxy/envoy'
      && (github.event.schedule
             || !contains(github.actor, '[bot]'))
      && (github.event.inputs.job_to_run == 'all'
             || github.event.inputs.job_to_run == 'android'
             || github.event_name == 'schedule')
    needs: env
    uses: ./.github/workflows/_mobile_container_ci.yml
    with:
      args: ${{ matrix.args }}
      container: ${{ fromJSON(needs.env.outputs.build-image).mobile }}
      container-output: |
        "bazel-bin/library/kotlin/io/envoyproxy/envoymobile/${{ matrix.output }}.aar": build/
        "bazel-bin/library/kotlin/io/envoyproxy/envoymobile/${{ matrix.output }}-pom.xml": build/
        "bazel-bin/library/kotlin/io/envoyproxy/envoymobile/${{ matrix.output }}-sources.jar": build/
        "bazel-bin/library/kotlin/io/envoyproxy/envoymobile/${{ matrix.output }}-javadoc.jar": build/
      request: ${{ needs.env.outputs.request }}
      steps-pre: |
        - run: |
            mkdir /tmp/mobile
            VERSION="0.5.0.$(date '+%Y%m%d')"
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
          shell: bash
      steps-post: |
        - run: |
            mkdir /tmp/output
          shell: bash
        - name: Tar artifacts
          run: >-
            tar
            -czhf
            /tmp/output/${{ matrix.output }}_android_aar_sources.tar.gz
            -C
            /tmp/container-output/build
            .
          shell: bash
      target: ${{ matrix.target }}
      upload-name: ${{ matrix.output }}_android_aar_sources
      upload-path: /tmp/output/${{ matrix.output }}_android_aar_sources.tar.gz
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: android-release
          args: >-
            build
            --config=ci
            --config=mobile-rbe
            --config=mobile-release
            --config=mobile-android-publish
            --define=pom_version=$VERSION
            //:android_dist
          output: envoy

  android-deploy:
    needs: android-release
    if: >-
      always()
      && (github.event.inputs.job_to_run == 'all'
             || github.event.inputs.job_to_run == 'android'
             || github.event_name == 'schedule')
      && (needs.android-release.result == 'success')
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
        - output: envoy
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        fetch-depth: 0
    - name: Add safe directory
      run: git config --global --add safe.directory /__w/envoy/envoy
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: ${{ matrix.output }}_android_aar_sources
        path: .
    - name: Expand archive
      run: |
        tar -xf ${{ matrix.output }}_android_aar_sources.tar.gz
    - name: 'Configure gpg signing'
      env:
        GPG_KEY: ${{ secrets.EM_GPG_KEY }}
        GPG_PASSPHRASE: ${{ secrets.EM_GPG_PASSPHRASE }}
      run: |
        # https://github.com/keybase/keybase-issues/issues/2798
        export GPG_TTY=$(tty)
        # Import gpg keys and warm the passphrase to avoid the gpg
        # passphrase prompt when initating a deploy
        # `--pinentry-mode=loopback` could be needed to ensure we
        # suppress the gpg prompt
        echo $GPG_KEY | base64 --decode > signing-key
        gpg --passphrase $GPG_PASSPHRASE --batch --import signing-key
        shred signing-key

        gpg --pinentry-mode=loopback --passphrase $GPG_PASSPHRASE -ab ${{ matrix.output }}.aar
        gpg --pinentry-mode=loopback --passphrase $GPG_PASSPHRASE -ab ${{ matrix.output }}-pom.xml
        gpg --pinentry-mode=loopback --passphrase $GPG_PASSPHRASE -ab ${{ matrix.output }}-javadoc.jar
        gpg --pinentry-mode=loopback --passphrase $GPG_PASSPHRASE -ab ${{ matrix.output }}-sources.jar
    - name: 'Release to sonatype repository'
      env:
        READWRITE_USER: ${{ secrets.EM_SONATYPE_USER }}
        READWRITE_API_KEY: ${{ secrets.EM_SONATYPE_PASSWORD }}
        SONATYPE_PROFILE_ID: ${{ secrets.EM_SONATYPE_PROFILE_ID }}
      run: |
        version="0.5.0.$(date '+%Y%m%d')"
        python mobile/ci/sonatype_nexus_upload.py \
          --profile_id=$SONATYPE_PROFILE_ID \
          --artifact_id=${{ matrix.output }} \
          --version=$version \
          --files \
            ${{ matrix.output }}.aar \
            ${{ matrix.output }}-pom.xml \
            ${{ matrix.output }}-sources.jar \
            ${{ matrix.output }}-javadoc.jar \
          --signed_files \
            ${{ matrix.output }}.aar.asc \
            ${{ matrix.output }}-pom.xml.asc \
            ${{ matrix.output }}-sources.jar.asc \
            ${{ matrix.output }}-javadoc.jar.asc

  python-release:
    permissions:
      actions: read
      contents: read
      packages: read
    if: >-
      github.repository == 'envoyproxy/envoy'
      && (github.event_name == 'workflow_dispatch')
      && (github.event.inputs.job_to_run == 'all'
             || github.event.inputs.job_to_run == 'python')
    needs: env
    name: Build and Publish Python Wheel
    uses: ./.github/workflows/_mobile_container_ci.yml
    with:
      args: ${{ matrix.args }}
      container: ${{ fromJSON(needs.env.outputs.build-image).default }}
      container-output: |
        "bazel-bin/library/python/": build/
      request: ${{ needs.env.outputs.request }}
      steps-post: |
        - name: Repair wheel
          run: |
            mkdir -p /tmp/dist
            WHEEL_PATH=$(find /tmp/container-output/build -name "*.whl" | head -n 1)

            if [[ -z "$WHEEL_PATH" ]]; then
                echo "Error: No wheel file found in /tmp/container-output/build"
                ls -R /tmp/container-output/
                exit 1
            fi
            python3 -m venv envoy_wheel
            source envoy_wheel/bin/activate
            pip install patchelf auditwheel

            auditwheel repair "$WHEEL_PATH" --wheel-dir /tmp/dist
          shell: bash
      target: ${{ matrix.target }}
      upload-name: python-wheel
      upload-path: /tmp/dist/*.whl
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: envoy_mobile_wheel
          args: >-
            build
            --config=ci
            --config=mobile-rbe
            --config=mobile-release
            -c opt --strip=always
            //library/python:envoy_mobile_wheel
            --//library/python:python_platform="manylinux2014_x86_64"

  python-publish:
    needs: python-release
    if: >-
      always()
        && (github.event.inputs.job_to_run == 'all'
               || github.event.inputs.job_to_run == 'python')
        && (needs.python-release.result == 'success')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
    environment:
      name: pypi
      url: https://pypi.org/p/envoy-mobile-client
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-wheel
        path: dist/
    - name: Publish to PyPi
      uses: pypa/gh-action-pypi-publish@release/v1
