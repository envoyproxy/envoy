                "BUILD.bazel": "###############################################################################\n# @generated\n# DO NOT MODIFY: This file is auto-generated by a crate_universe tool. To \n# regenerate this file, run the following:\n#\n#     bazel mod show_repo 'proxy-wasm-cpp-host'\n###############################################################################\n\npackage(default_visibility = [\"//visibility:public\"])\n\nexports_files(\n    [\n        \"cargo-bazel.json\",\n        \"crates.bzl\",\n        \"defs.bzl\",\n    ] + glob(\n        allow_empty = True,\n        include = [\"*.bazel\"],\n    ),\n)\n\nfilegroup(\n    name = \"srcs\",\n    srcs = glob(\n        allow_empty = True,\n        include = [\n            \"*.bazel\",\n            \"*.bzl\",\n        ],\n    ),\n)\n\n# Workspace Member Dependencies\nalias(\n    name = \"anyhow-1.0.86\",\n    actual = \"@cu__anyhow-1.0.86//:anyhow\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"anyhow\",\n    actual = \"@cu__anyhow-1.0.86//:anyhow\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"env_logger-0.10.2\",\n    actual = \"@cu__env_logger-0.10.2//:env_logger\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"env_logger\",\n    actual = \"@cu__env_logger-0.10.2//:env_logger\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"log-0.4.22\",\n    actual = \"@cu__log-0.4.22//:log\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"log\",\n    actual = \"@cu__log-0.4.22//:log\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"once_cell-1.19.0\",\n    actual = \"@cu__once_cell-1.19.0//:once_cell\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"once_cell\",\n    actual = \"@cu__once_cell-1.19.0//:once_cell\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tracing-0.1.40\",\n    actual = \"@cu__tracing-0.1.40//:tracing\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tracing\",\n    actual = \"@cu__tracing-0.1.40//:tracing\",\n    tags = [\"manual\"